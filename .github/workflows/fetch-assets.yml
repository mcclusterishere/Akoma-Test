name: Fetch assets from visitakoma.com

# Pulls the current site's images (logo, storefront photos) into
# assets/scraped/ so the rebuild can use the real brand material.
# Runs on GitHub's runners (open network) — trigger it from the
# Actions tab: Run workflow.

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Pull every image the old site serves
        run: |
          node - << 'EOF'
          const fs = require("fs");
          (async () => {
            const home = await (await fetch("https://visitakoma.com", {
              headers: { "user-agent": "Mozilla/5.0 (compatible; AkomaRebuild/1.0)" }
            })).text();
            fs.mkdirSync("assets/scraped", { recursive: true });
            fs.writeFileSync("assets/scraped/homepage.html", home);
            const urls = [...new Set(
              [...home.matchAll(/(?:src|href|content)=["']([^"']+\.(?:png|jpe?g|webp|svg|gif|ico))(\?[^"']*)?["']/gi)]
                .map(m => m[1])
                .map(u => u.startsWith("http") ? u : new URL(u, "https://visitakoma.com").href)
            )];
            console.log("found", urls.length, "images");
            for (const u of urls.slice(0, 60)) {
              try {
                const r = await fetch(u, { headers: { "user-agent": "Mozilla/5.0" } });
                if (!r.ok) { console.log("skip", r.status, u); continue; }
                const name = u.split("/").pop().split("?")[0].replace(/[^A-Za-z0-9._-]/g, "_").slice(-80);
                fs.writeFileSync("assets/scraped/" + name, Buffer.from(await r.arrayBuffer()));
                console.log("✓", name);
              } catch (e) { console.log("✗", u, String(e).slice(0, 80)); }
            }
          })();
          EOF
      - name: Commit what came home
        run: |
          git config user.name "Akoma Assets"
          git config user.email "hello@visitakoma.com"
          git add assets/scraped
          git diff --cached --quiet || git commit -m "Assets pulled from visitakoma.com"
          git push
